name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: veheys.online
          username: flexdrrexar
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/flex

            echo "=== Pulling latest code ==="
            git pull

            echo "=== Building server ==="
            cd /opt/flex/server
            npm install
            npx prisma generate
            npm run build

            echo "=== Building client ==="
            cd /opt/flex/client
            npm install
            npm run build
            sudo cp -r dist/* /var/www/html/

            echo "=== Restarting server ==="
            sudo pkill -f "tsx /opt/flex/server" || true
            screen -dmS flex-server bash -c 'DATABASE_URL="postgresql://flex:flex_password@localhost:5432/flexdb?schema=public" JWT_SECRET="${{ secrets.JWT_SECRET }}" tsx /opt/flex/server/src/index.ts'

            echo "=== Reloading nginx ==="
            sudo systemctl reload nginx || sudo systemctl start nginx

            echo "=== Deploy complete ==="
