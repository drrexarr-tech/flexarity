name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: veheys.online
          username: flexdrrexar
          port: 8833
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=$PATH:/opt/flex/server/node_modules/.bin

            echo "=== Pulling latest code ==="
            cd /opt/flex && git fetch origin && git reset --hard origin/main

            echo "=== Building server ==="
            cd /opt/flex/server
            npm install --silent
            npx prisma generate
            npx prisma migrate deploy
            npm run build

            echo "=== Building client ==="
            cd /opt/flex/client
            npm install --silent
            npm run build
            sudo cp -r dist/* /var/www/html/

            echo "=== Restarting server ==="
            screen -X -S flex-server quit 2>/dev/null || true
            screen -dmS flex-server bash -c 'cd /opt/flex/server && DATABASE_URL="postgresql://flex:flex_password@localhost:5432/flexdb?schema=public" JWT_SECRET="${{ secrets.JWT_SECRET }}" node dist/index.js'

            echo "=== Reloading nginx ==="
            sudo systemctl reload nginx || sudo systemctl start nginx

            echo "=== Deploy complete ==="
